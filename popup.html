<!DOCTYPE html>
<html lang="ru">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<link rel="stylesheet" href="popup/popup.css">
</head>
<body>
	<header class="app-header">
		<div class="title">
			<h2 class="title-short">BBE</h2>
			<p class="title-full">Browser Bookmarks Exporter</p>
		</div>
		<div class="tabs-meter" aria-live="polite">
			<strong id="tabsCount">0</strong>
			<span id="tabsLabel">вкладок</span>
		</div>
	</header>

	<main class="popup-shell">
		<div class="mode-tabs" role="tablist" aria-label="Режим работы">
			<button class="mode-tab mode-tab--active" type="button" id="exportTabBtn" role="tab" aria-selected="true" aria-controls="exportPanel">Экспорт</button>
			<button class="mode-tab" type="button" id="importTabBtn" role="tab" aria-selected="false" aria-controls="importPanel">Импорт</button>
		</div>

		<section class="panel" id="exportPanel" role="tabpanel" aria-labelledby="exportTabBtn" aria-label="Настройки экспорта">
			<div class="field">
				<span class="field-label">Формат файла</span>
				<div class="segment-group" role="radiogroup" aria-label="Формат файла">
					<label class="segment">
						<input type="radio" name="format" value="md" checked>
						<span>MD</span>
					</label>
					<label class="segment">
						<input type="radio" name="format" value="txt">
						<span>TXT</span>
					</label>
					<label class="segment">
						<input type="radio" name="format" value="html">
						<span>HTML</span>
					</label>
					<label class="segment">
						<input type="radio" name="format" value="json">
						<span>JSON</span>
					</label>
				</div>
			</div>

			<div class="field">
				<label class="field-label" for="filename">Имя файла</label>
				<input class="text-input" type="text" id="filename" placeholder="open-tabs" value="open-tabs" autocomplete="off">
			</div>

			<div class="field">
				<label class="field-label" for="savePath">Куда сохранить</label>
				<p class="field-hint">Если папка не выбрана, файл будет скачан в Загрузки.</p>
				<div class="path-row">
					<input class="path-input" type="text" id="savePath" value="Загрузки" readonly>
					<button class="secondary-btn" type="button" id="selectPathBtn">Выбрать</button>
				</div>
			</div>

			<label class="switch-row" for="closeAfterExport">
				<input class="switch-input" type="checkbox" id="closeAfterExport">
				<span class="switch-track" aria-hidden="true"></span>
				<div>
					<span class="switch-title">Закрыть вкладки после экспорта</span>
					<span class="switch-description">Опция выключена по умолчанию.</span>
				</div>
			</label>

			<button class="primary-btn" type="button" id="exportBtn">Экспортировать вкладки</button>
		</section>

		<section class="panel" id="importPanel" role="tabpanel" aria-labelledby="importTabBtn" aria-label="Настройки импорта" hidden>
			<div class="field">
				<span class="field-label">Файл экспорта</span>
				<div class="file-row">
					<button class="secondary-btn" type="button" id="selectImportFileBtn">Выбрать файл</button>
					<span class="file-name" id="importFileName">Файл не выбран</span>
				</div>
				<input class="file-input" type="file" id="importFile" accept=".json,.txt,.md,.html,text/plain,text/html,text/markdown,application/json">
			</div>

			<div class="field">
				<label class="field-label" for="importText">Ссылки для импорта</label>
				<textarea class="import-text" id="importText" spellcheck="false" placeholder="https://example.com/page"></textarea>
				<p class="field-hint">Поддерживаются файлы и текст из JSON, MD, TXT и HTML экспорта.</p>
			</div>

			<button class="primary-btn" type="button" id="importBtn">Открыть ссылки</button>
		</section>

		<div class="status" id="status" role="status" aria-live="polite" hidden></div>
	</main>

	<footer class="bottom-info">
		<a href="https://github.com/IndyukovAnton" class="author">Anton I.</a>
		<a href="https://github.com/IndyukovAnton/Bookmark-Exporter" class="label-version">v1.0.0</a>
	</footer>

	<script src="core/tabs.js"></script>
	<script src="core/export-file.js"></script>
	<script src="core/import-file.js"></script>
	<script src="browser/chromium-tabs.js"></script>
	<script src="browser/chromium-storage.js"></script>
	<script src="browser/file-save-strategies.js"></script>
	<script src="popup/messages.js"></script>
	<script src="popup/dom.js"></script>
	<script src="popup/export-flow.js"></script>
	<script src="popup/import-flow.js"></script>
	<script src="popup/popup-controller.js"></script>
	<script src="popup.js"></script>
</body>
</html>
